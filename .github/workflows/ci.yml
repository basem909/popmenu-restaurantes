name: CI
on:
  pull_request:
    branches: [ "dev", "main" ]
  push:
    branches: [ "dev", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: popmenu_restaurantes_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/popmenu_restaurantes_test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install OS deps (optional but safe for pg)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Bundle
        run: bundle install --jobs 4 --retry 3

      - name: DB prepare
        run: |
          bin/rails db:create
          bin/rails db:migrate || true   # no migrations yet; don't fail settings branch

      - name: RuboCop
        run: bundle exec rubocop

      - name: RSpec
        run: bundle exec rspec --format documentation
